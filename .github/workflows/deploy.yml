name: Deploy TiddlyWiki

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TiddlyWiki
        run: npm install -g tiddlywiki

      - name: Add read-only config
        run: |
          echo -e "title: \$:/config/ViewToolbarButtons/Visibility/\$:/core/ui/Buttons/edit\ntext: hide" > "mywiki/tiddlers/\$__config_ViewToolbarButtons_Visibility_\$__core_ui_Buttons_edit.tid"
          echo -e "title: \$:/config/SyncFilter\ntext: " > "mywiki/tiddlers/\$__config_SyncFilter.tid"

      - name: Build TiddlyWiki
        run: tiddlywiki mywiki --build index

      - name: Move output
        run: |
          cp mywiki/output/index.html ./index.html
          cp -r mywiki/files ./files

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
